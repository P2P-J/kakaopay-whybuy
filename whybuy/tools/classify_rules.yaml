# G2 공시 세부유형 분류 사전 (classify.py 2단 매핑)
# 매칭은 정규화된 제목(공백·가운뎃점 제거, 전각괄호→반각)에 대해 substring으로 한다.
# 규칙은 위→아래 순서로 평가하며 첫 매칭이 유형을 결정한다(specific first).
# 미매칭은 etc. 골든 라벨 세트와 함께만 수정한다(결정 주권, G2 plan 4).
# 키워드는 정규화형(가운뎃점 없음)으로 적는다.

rules:
  - type: earnings          # 실적 (정기·잠정)
    keywords: ["영업(잠정)실적", "잠정실적", "영업실적등에대한전망", "손익구조", "분기보고서", "반기보고서", "사업보고서"]
  - type: dividend          # 배당 (배당결정·명부폐쇄. '고배당' 등 서술어 과대매칭 방지 위해 '배당결정/배당을위한'으로 한정)
    keywords: ["배당결정", "배당을위한"]
  - type: treasury          # 자기주식·소각
    keywords: ["자기주식", "자사주", "주식소각", "신탁계약"]
  - type: capital_change    # 자본구조 변경 — 증자·CB·감자 (증자=희석/감자=감소, 방향은 title에 보존). 초보자가 스스로 못 잡는 중대사실이라 etc로 접지 않는다
    keywords: ["전환사채", "신주인수권부사채", "유상증자", "무상증자", "감자", "증권신고서", "투자설명서", "증권발행실적", "일괄신고"]
  - type: major_shareholder # 최대주주·지분 ('임원' 단독은 '대표집행임원' 과대매칭이라 제외, '특정증권등'로 소유상황·거래계획 모두 포착)
    keywords: ["최대주주", "대량보유", "특정증권등"]
  - type: audit             # 감사의견
    keywords: ["감사보고서"]
  - type: litigation        # 소송·제재
    keywords: ["소송", "제재", "과징금", "벌금", "횡령", "배임", "행정처분"]
  - type: supply_contract   # 단일판매·공급계약
    keywords: ["공급계약", "단일판매"]
  - type: facility_investment  # 시설투자
    keywords: ["시설투자", "신규시설"]
  - type: business_halt     # 사업중단·영업정지
    keywords: ["영업정지", "사업중단", "영업중단", "해산"]
