# 컴플라이언스 게이트 규칙 사전 — whybuy (G4)
#
# 범위(정직): 이 게이트는 "세상 모든 권유 표현 검출"을 목표하지 않는다. 우리 브리핑은
# 템플릿 빈칸 채우기라 문장 공간이 좁다 → 목표는 "이 시스템 산출물에서 권유·예측·평가어
# 0건 보장 + 테스트로 증명". 근본 방어는 템플릿 생성(1차), 이 게이트는 2차 방어선이다.
# 금지 패턴은 지시형·권고형·예측형·평가형 **종결/구문 표현**만 겨냥한다 — "매수/매도" 같은
# 명사 단독이나 사실 서술("임원이 매도했다는 공시", "매수 논거", "+32%", "시장 대비 하회")은
# 검출 대상이 아니다(양성 세트로 오탐 0을 함께 검증).
#
# 필수 문구(면책·기준일·반증정의·거울질문)는 tools/textstore.py 단일 출처에서 임포트한다.
# 규칙 추가·검토는 코드 수정 없이 이 파일에서. **아엔 승인 후 확정 (결정 주권).**

forbidden_patterns:
  # 지시·권고 (행동 종결/권유)
  - id: directive-imperative
    category: 지시
    regex: '(사|팔|파|매수하|매도하|보유하|버티|담으|처분하|손절하|익절하)(세요|십시오|시길|시기\s*바랍니다)'
  - id: directive-better-to
    category: 권고
    regex: '(파는|사는|매도하는|매수하는|손절하는|익절하는)\s*(게|것이)\s*(낫|좋)'
  - id: directive-recommend
    category: 권유
    regex: '(매도|매수|손절|익절|비중\s*(확대|축소))(를|을)?\s*(고려|추천|권장|권유|권합니다)'
  # 예측
  - id: predict-forecast
    category: 예측
    regex: '(예상|전망)(됩니다|된다|입니다)'
  - id: predict-likelihood
    category: 예측
    regex: '(오를|내릴|상승할|하락할|반등할|빠질|급등할|급락할)\s*(것으로|가능성|전망)'
  - id: predict-probability
    category: 예측
    regex: '가능성이\s*(높|큽|커)'
  # 평가어
  # 경계 주의: "시장 대비 상회/유사/하회"는 지수와의 산술 비교 결과라 허용(계산),
  #   "저평가/고평가/매력적/유망"은 판단이라 금지(평가어). 표현이 비슷해 헷갈리기 쉬우므로
  #   test_gate.py에 상회/하회=PASS vs 저평가/고평가=BLOCKED 대비를 고정해 경계를 지킨다.
  - id: valuation-terms
    category: 평가
    regex: '(저평가|고평가|저렴|매력적|유망|호재|악재|바닥권|고점|과매도|과매수)'
  - id: valuation-opportunity
    category: 평가
    regex: '(저가\s*매수|매수\s*기회|매도\s*기회)'
  # 단정
  - id: certainty-assertion
    category: 단정
    regex: '(확실히|분명히|반드시|틀림없이)\s*.{0,8}(오릅|오를|상승|하락|내립|내릴|급등|급락)'

# 필수 요소 검사용 구조 패턴 (문구 자체는 textstore에서 임포트)
required:
  as_of_pattern: '까지\s*제출된\s*공시\s*기준'   # textstore.AS_OF_NOTICE_TEMPLATE
  verdict_marker: '\*\*(유효|약화|반증|확인불가)\*\*'
  linked_statuses: ['유효', '약화', '반증']       # 원문 URL 필수 상태
  link_pattern: '\[[^\]]+\]\([^)]+\)'
  absence_pattern: '부재|대조를\s*시도'            # 확인불가·부재 라인의 대체 필수 요소

# 허용 예외: textstore.MIRROR_QUESTION(거울 고정 질문)은 코드에서 자동 등재.
# 추가 예외 문장을 여기 나열하면 금지 스캔 전에 제거된다.
allowed_exceptions: []
